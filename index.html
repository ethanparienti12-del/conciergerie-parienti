<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conciergerie Airbnb Paris & Bordeaux | Ethan Parienti</title>
<meta name="description" content="Conciergerie Airbnb à Paris et Bordeaux. Accueil voyageurs, ménage, communication et accompagnement propriétaire.">
<style>
:root{--bg:#0a0a0a;--text:#f6f6f6;--muted:rgba(255,255,255,.72);--muted2:rgba(255,255,255,.58);--line:rgba(255,255,255,.1);--gold:#e7c87a;--goldSoft:rgba(231,200,122,.16);--shadow:0 18px 50px rgba(0,0,0,.32)}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}body{min-height:100vh}
button,input,textarea{font:inherit}.container{width:min(1180px,calc(100% - 32px));margin:0 auto}
.topbar{position:sticky;top:0;z-index:20;background:rgba(10,10,10,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 0;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}.brand-copy .name{margin:0 0 4px;font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold)}.brand-copy .sub{margin:0;color:var(--muted2);font-size:14px}
.brand-logo{display:flex;height:52px;width:52px;align-items:center;justify-content:center;border-radius:50%;border:1px solid rgba(231,200,122,.35);background:linear-gradient(135deg,rgba(231,200,122,.18),rgba(255,255,255,.05));box-shadow:var(--shadow)}
.brand-logo span{display:flex;height:36px;width:36px;align-items:center;justify-content:center;border-radius:50%;border:1px solid rgba(231,200,122,.45);background:#0d0d0d;color:var(--gold);font-weight:700;letter-spacing:.18em;font-size:14px}
.nav{display:flex;gap:8px;flex-wrap:wrap}.nav button,.btn,.btn-ghost{border:none;border-radius:999px;padding:12px 18px;cursor:pointer;transition:.2s ease;white-space:nowrap}
.nav button{background:transparent;color:var(--muted)}.nav button.active{background:#fff;color:#111}.nav button:hover{background:rgba(255,255,255,.08);color:#fff}
.btn{background:#fff;color:#111;font-weight:700}.btn-ghost{background:var(--goldSoft);color:#f5e8bf;border:1px solid rgba(231,200,122,.28);font-weight:600}
.hero{position:relative;overflow:hidden}.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(245,158,11,.18),transparent 28%),radial-gradient(circle at left,rgba(255,255,255,.06),transparent 24%)}
.hero-inner{position:relative;display:grid;grid-template-columns:1.08fr .92fr;gap:42px;align-items:center;padding:72px 0 48px}
.tag-wrap{display:flex;align-items:center;gap:14px;margin-bottom:24px}.tag{display:inline-flex;border-radius:999px;border:1px solid rgba(231,200,122,.2);background:rgba(231,200,122,.1);padding:10px 14px;font-size:12px;text-transform:uppercase;letter-spacing:.32em;color:#f5e8bf}
h1,h2,h3,p{margin:0}.hero h1{margin-top:22px;font-size:clamp(38px,7vw,76px);line-height:1.05;letter-spacing:-.04em}.lead{margin-top:20px;max-width:760px;font-size:clamp(18px,2vw,22px);line-height:1.7;color:var(--muted)}
.actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:30px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:34px}
.card{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.stat{padding:20px}.stat .value{font-size:30px;font-weight:700;color:var(--gold);margin-bottom:6px}.stat .label{font-size:14px;color:var(--muted2)}
.panel{padding:16px;background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.05));border-radius:34px;border:1px solid var(--line)}.panel-inner{padding:32px;border-radius:28px;border:1px solid rgba(231,200,122,.18);background:#111}
.eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.35em;color:var(--gold)}.panel-title{margin-top:18px;font-size:34px;line-height:1.2}
.bullet-list{display:grid;gap:12px;margin-top:26px}.bullet{padding:16px 18px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:rgba(255,255,255,.85)}
.section{padding:70px 0}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
.service-card,.info-card{padding:28px}.service-card h3,.info-card h2{margin-top:16px;font-size:28px}.service-card p,.info-card p{margin-top:16px;color:var(--muted2);line-height:1.8}
.banner{display:grid;grid-template-columns:1fr .8fr;gap:28px;align-items:center;padding:34px;border-radius:34px;border:1px solid rgba(231,200,122,.15);background:linear-gradient(90deg,rgba(231,200,122,.12),rgba(255,255,255,.05),transparent)}
.banner h2,.banner h3{font-size:40px;line-height:1.15}.page-head h1{margin-top:16px;font-size:clamp(34px,5vw,62px);line-height:1.1}.page-head p{margin-top:20px;max-width:820px;font-size:20px;line-height:1.75;color:var(--muted)}
.form-box{padding:32px;border-radius:34px;background:rgba(255,255,255,.05);border:1px solid var(--line);box-shadow:var(--shadow)}.form-grid{display:grid;gap:16px}
.input,textarea{width:100%;padding:16px 18px;border-radius:18px;background:#171717;border:1px solid var(--line);color:#fff;outline:none}textarea{min-height:140px;resize:vertical}
.contact-meta{margin-top:26px;display:grid;gap:8px;color:var(--muted)}.footer{border-top:1px solid var(--line);background:rgba(0,0,0,.3);margin-top:40px}
.footer-inner{padding:40px 0;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}.footer h4{margin:0 0 14px;font-size:16px}.footer p,.footer button{color:var(--muted2);line-height:1.8}.footer-links{display:grid;gap:8px;justify-items:start}.footer-links button{background:none;border:none;padding:0;cursor:pointer}
a.inline-link{color:#f5e8bf}
@media (max-width:980px){.hero-inner,.banner,.grid-2,.grid-3,.footer-inner{grid-template-columns:1fr}.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const app=document.getElementById('app');
const state={page:'home'};
const brandLogo='<div class="brand-logo"><span>EP</span></div>';
function header(){const nav=[['home','Accueil'],['services','Services'],['areas','Zones'],['pricing','Tarifs'],['about','À propos'],['contact','Contact']].map(([k,l])=>'<button class="'+(state.page===k?'active':'')+'" onclick="navigate(\''+k+'\')">'+l+'</button>').join('');return '<header class="topbar"><div class="container topbar-inner"><button onclick="navigate(\'home\')" style="background:none;border:none;padding:0;cursor:pointer"><div class="brand">'+brandLogo+'<div class="brand-copy"><p class="name">Ethan Parienti</p><p class="sub">Conciergerie • Paris & Bordeaux</p></div></div></button><nav class="nav">'+nav+'</nav><button class="btn-ghost" onclick="navigate(\'contact\')">Demander un rappel</button></div></header>'}
function footer(){return '<footer class="footer"><div class="container footer-inner"><div><p class="name" style="margin:0 0 10px;color:var(--gold)">ETHAN PARIENTI</p><p>Conciergerie Airbnb à Paris et Bordeaux. Accueil voyageurs, ménage, communication, gestion des séjours et accompagnement propriétaire.</p></div><div><h4>Navigation</h4><div class="footer-links"><button onclick="navigate(\'home\')">Accueil</button><button onclick="navigate(\'services\')">Services</button><button onclick="navigate(\'areas\')">Zones</button><button onclick="navigate(\'pricing\')">Tarifs</button><button onclick="navigate(\'about\')">À propos</button><button onclick="navigate(\'contact\')">Contact</button></div></div><div><h4>Services</h4><p>Accueil voyageurs, ménage, communication, préparation du logement, coordination des séjours et optimisation de l’exploitation.</p></div></div></footer>'}
function faq(){const faqs=[["Qu’est-ce qu’une conciergerie Airbnb à Paris et Bordeaux ?","C’est un service qui prend en charge tout ou partie de la gestion d’une location courte durée : accueil voyageurs, ménage, coordination, communication et valorisation du bien."],["Dans quels secteurs intervenez-vous ?","Nous pouvons intervenir dans tout Bordeaux, dans tout Paris, ainsi que dans certaines zones proches comme le 92, selon le type de bien, sa localisation et la faisabilité opérationnelle."],["Comment sont définis les tarifs ?","Les tarifs dépendent du type de bien, du niveau de service souhaité et de l’intensité d’exploitation locative. Une étude personnalisée permet de proposer une formule adaptée."]].map(([q,a])=>'<div class="card info-card"><h2>'+q+'</h2><p>'+a+'</p></div>').join('');return '<section class="section" style="padding-top:0"><div class="container"><div class="page-head"><div class="eyebrow">Questions fréquentes</div><h1 style="font-size:clamp(28px,4vw,50px)">Réponses utiles pour vos futurs clients.</h1></div><div style="display:grid;gap:22px;margin-top:32px">'+faqs+'</div></div></section>'}
function home(){const stats=[['24/7','Réactivité voyageurs'],['Paris','Zone d’intervention'],['Bordeaux','Zone d’intervention']].map(([v,l])=>'<div class="card stat"><div class="value">'+v+'</div><div class="label">'+l+'</div></div>').join('');const pillars=[['Accueil voyageurs','Gestion des arrivées, échanges avant le séjour, assistance pendant la réservation et présence réactive en cas de besoin.'],['Ménage et préparation','Organisation du ménage entre les séjours, remise en état du logement et préparation pour accueillir les voyageurs dans de bonnes conditions.'],['Communication et suivi','Réponses rapides, coordination des demandes, suivi des séjours et accompagnement du propriétaire au quotidien.']].map(([t,txt])=>'<div class="card service-card"><div class="eyebrow">Service</div><h3>'+t+'</h3><p>'+txt+'</p></div>').join('');const bullets=['Accueil voyageurs','Ménage et remise en état','Communication avant et pendant le séjour','Suivi complet de l’activité'].map(x=>'<div class="bullet">'+x+'</div>').join('');return '<section class="hero"><div class="container hero-inner"><div><div class="tag-wrap">'+brandLogo+'<div class="tag">Conciergerie Airbnb à Paris & Bordeaux</div></div><h1>Gestion complète de vos locations courte durée à Paris et Bordeaux.</h1><p class="lead">Ethan Parienti et Kenzo Thirion accompagnent les propriétaires qui souhaitent déléguer la gestion de leur Airbnb avec un service clair, réactif et efficace : accueil voyageurs, ménage, communication et suivi complet des séjours.</p><div class="actions"><button class="btn" onclick="navigate(\'services\')">Découvrir les services</button><button class="btn-ghost" onclick="navigate(\'contact\')">Demander un rappel</button></div><div class="stats">'+stats+'</div></div><div class="panel"><div class="panel-inner"><div class="eyebrow">Gestion terrain</div><h2 class="panel-title">Une conciergerie pensée pour les besoins concrets de la location courte durée.</h2><div class="bullet-list">'+bullets+'</div></div></div></div></section><section class="section"><div class="container grid-3">'+pillars+'</div></section><section class="section" style="padding-top:0"><div class="container"><div class="banner"><div><div class="eyebrow">Paris & Bordeaux</div><h2>Nous pouvons prendre en charge des Airbnb dans tout Paris, dans le 92 à proximité, et dans tout Bordeaux selon le bien et le besoin.</h2></div><div><button class="btn" onclick="navigate(\'areas\')">Voir les zones</button></div></div></div></section>'+faq()}
function services(){const items=[['Gestion intégrale','Prise en charge complète de l’activité locative, du calendrier aux échanges voyageurs, avec un suivi clair et régulier.'],['Création et optimisation d’annonce','Présentation du logement, rédaction de l’annonce, amélioration de la visibilité et mise en avant des points forts du bien.'],['Accueil voyageurs','Organisation des arrivées, échanges avant et pendant le séjour, assistance et suivi pour une expérience simple et rassurante.'],['Ménage et préparation du logement','Ménage entre les séjours, remise en état du logement, vérification générale et préparation pour les prochains voyageurs.'],['Suivi propriétaire','Vision claire de l’activité, accompagnement régulier et relation directe pour garder le contrôle sur l’exploitation du bien.'],['Communication et suivi','Réactivité dans les échanges, coordination des demandes, gestion des imprévus et suivi global de l’activité.']].map(([t,txt])=>'<div class="card info-card"><h2>'+t+'</h2><p>'+txt+'</p></div>').join('');return '<section class="section"><div class="container"><div class="page-head"><div class="eyebrow">Services</div><h1>Une offre de conciergerie claire, efficace et adaptée à la location courte durée.</h1><p>Notre approche couvre les besoins concrets de la location courte durée : accueil voyageurs, ménage, communication, préparation du logement, coordination des séjours et accompagnement propriétaire.</p></div><div class="grid-3" style="margin-top:38px">'+items+'</div><div class="banner" style="margin-top:38px"><div><div class="eyebrow">Pour qui ?</div><h3>Pour les propriétaires qui veulent déléguer sérieusement la gestion d’un Airbnb à Paris ou à Bordeaux.</h3></div><div><button class="btn" onclick="navigate(\'contact\')">Parler de votre bien</button></div></div></div></section>'}
function areas(){const items=[['Tout Bordeaux','Nous pouvons intervenir sur l’ensemble de Bordeaux selon le type de bien, son emplacement et son potentiel en location courte durée.'],['Tout Paris','Nous prenons aussi des biens dans tout Paris, avec une gestion adaptée aux appartements exploités en courte durée.'],['92 et proche Paris','Certaines zones proches de Paris, notamment dans le 92, peuvent également être étudiées selon le bien et l’organisation à mettre en place.'],['Gare du Nord et zones de transit','Des emplacements stratégiques comme Gare du Nord peuvent être intéressants en courte durée grâce au flux de voyageurs et à la demande régulière.'],['Quartiers résidentiels et zones de passage','Nous ne nous limitons pas aux quartiers dits premium : un bien bien placé et bien géré peut fonctionner dans de nombreux secteurs.'],['Étude au cas par cas','Chaque logement est analysé selon sa localisation, sa demande potentielle, son accessibilité et sa cohérence avec la location saisonnière.']].map(([t,txt])=>'<div class="card info-card"><h2>'+t+'</h2><p>'+txt+'</p></div>').join('');return '<section class="section"><div class="container"><div class="page-head"><div class="eyebrow">Zones d’intervention</div><h1>Conciergerie Airbnb à Paris, Bordeaux et dans de nombreux secteurs stratégiques.</h1><p>Nous accompagnons les propriétaires de locations courte durée à Paris comme à Bordeaux. Notre activité ne se limite pas à quelques quartiers haut de gamme : nous pouvons prendre des biens dans tout Paris, dans le 92 proche, et dans tout Bordeaux selon le projet.</p></div><div class="grid-2" style="margin-top:38px">'+items+'</div><div class="banner" style="margin-top:38px"><div><div class="eyebrow">Paris & Bordeaux</div><h3>Nous pouvons prendre des Airbnb dans tout Paris et tout Bordeaux, pas seulement dans les quartiers premium.</h3></div><div><button class="btn" onclick="navigate(\'contact\')">Étudier votre bien</button></div></div></div></section>'}
function pricing(){const items=[['Essentiel','Pour une gestion propre, sérieuse et efficace des fondamentaux de la location courte durée.'],['Confort','Pour une gestion plus complète avec davantage de suivi, de coordination et d’accompagnement au quotidien.'],['Sur mesure','Pour les besoins spécifiques, les biens avec plusieurs contraintes de gestion ou les propriétaires souhaitant une organisation adaptée à leur situation.']].map(([t,txt])=>'<div class="card info-card"><div class="eyebrow">Formule</div><h2 style="margin-top:12px">'+t+'</h2><p>'+txt+'</p><div class="bullet" style="margin-top:18px">Tarification communiquée sur étude du bien.</div></div>').join('');return '<section class="section"><div class="container"><div class="page-head"><div class="eyebrow">Tarifs</div><h1>Des formules de conciergerie adaptées à votre bien et à votre niveau de besoin.</h1><p>Chaque bien mérite une approche spécifique. Les tarifs sont établis selon le niveau de service attendu, la localisation du bien et l’intensité de gestion souhaitée.</p></div><div class="grid-3" style="margin-top:38px">'+items+'</div><div style="margin-top:38px"><button class="btn" onclick="navigate(\'contact\')">Demander une estimation</button></div></div></section>'}
function about(){const values=['Terrain','Réseau','Réactivité','Rentabilité'].map(v=>'<div class="bullet" style="font-size:20px;padding:20px">'+v+'</div>').join('');return '<section class="section"><div class="container"><div class="grid-2" style="align-items:start"><div><div class="page-head"><div class="eyebrow">À propos</div><h1>Une conciergerie construite autour du terrain, du réseau et de la rentabilité.</h1><p>Je m’appelle Ethan Parienti. J’ai commencé dans la conciergerie de luxe avec de nombreux partenariats de marque, ainsi qu’au contact de grands clubs renommés sur Paris. Aujourd’hui, je mets cette expérience au service d’une conciergerie plus directe, efficace et tournée vers la performance à Paris comme à Bordeaux.</p><p style="margin-top:18px">L’objectif est simple : offrir une gestion complète de la location courte durée, améliorer l’exploitation du bien et aider le propriétaire à viser une rentabilité potentiellement supérieure à celle d’une location longue durée, selon la ville, le taux d’occupation, le prix par nuit et la qualité de gestion.</p></div></div><div class="form-box"><div class="eyebrow">Base de travail</div><div class="grid-2" style="margin-top:24px">'+values+'</div><div class="bullet" style="margin-top:24px;color:#f5e8bf;background:rgba(231,200,122,.1);border-color:rgba(231,200,122,.2)">Une bonne location courte durée ne repose pas seulement sur le logement : elle dépend aussi de la gestion, de la communication, du ménage, du positionnement et de la régularité du suivi.</div></div></div><div class="banner" style="margin-top:38px"><div><h3>La location courte durée peut générer plus de revenus qu’une location classique quand le bien est bien géré, bien positionné et exploité dans une zone avec une vraie demande.</h3><p style="margin-top:18px">À Paris comme à Bordeaux, le potentiel dépend de plusieurs critères : emplacement, capacité du logement, niveau de finition, taux d’occupation, réglementation et qualité de gestion. Le but est de maximiser l’exploitation du bien tout en gardant une organisation sérieuse et durable.</p></div><div><button class="btn-ghost" onclick="navigate(\'contact\')">Demander un échange</button></div></div></div></section>'}
function contact(){return '<section class="section"><div class="container"><div class="grid-2" style="align-items:start"><div><div class="page-head"><div class="eyebrow">Contact</div><h1>Parlons de votre bien à Paris ou à Bordeaux.</h1><p>Partagez quelques informations sur votre appartement, votre maison ou votre projet locatif à Paris ou à Bordeaux. Nous reviendrons vers vous pour échanger sur la faisabilité, l’organisation et le potentiel de votre bien.</p></div><div class="contact-meta"><p>Téléphone : 07 88 14 84 04</p><p>Email : conciergerieparienti1@gmail.com</p><p>Instagram : <a class="inline-link" href="https://instagram.com/conciergerie_parienti" target="_blank" rel="noopener noreferrer">@conciergerie_parienti</a></p></div></div><div class="form-box"><div class="form-grid"><input class="input" type="text" placeholder="Nom et prénom"><input class="input" type="email" placeholder="Adresse e-mail"><input class="input" type="text" placeholder="Type de bien / secteur à Paris ou Bordeaux"><textarea placeholder="Décrivez votre besoin"></textarea><button class="btn" type="button">Être recontacté</button></div></div></div></div></section>'}
function render(){const pages={home,services,areas,pricing,about,contact};app.innerHTML=header()+pages[state.page]()+footer()}
function navigate(page){state.page=page;render()}window.navigate=navigate;render();
</script>
</body>
</html>
